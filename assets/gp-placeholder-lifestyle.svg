<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Glass Pads lifestyle desk setup placeholder">
  <defs>
    <linearGradient id="gp-life-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <radialGradient id="gp-life-glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#5EE6D9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5EE6D9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#gp-life-bg)"/>
  <rect width="1200" height="800" fill="url(#gp-life-glow)"/>
  <!-- desk silhouette -->
  <rect x="0" y="620" width="1200" height="10" fill="#2A2B30"/>
  <rect x="150" y="480" width="380" height="140" rx="18" fill="#1D1E22"/>
  <rect x="620" y="440" width="260" height="80" rx="10" fill="#1D1E22"/>
  <rect x="900" y="400" width="140" height="220" rx="14" fill="#1D1E22"/>
  <text x="600" y="200" font-family="Space Grotesk, sans-serif" font-size="30" fill="#9B9DA3" text-anchor="middle" letter-spacing="2">DESK SETUP — LIFESTYLE PHOTO</text>
</svg>
